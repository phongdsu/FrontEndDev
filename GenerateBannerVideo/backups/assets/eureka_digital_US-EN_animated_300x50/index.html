<!DOCTYPE HTML>
<html>

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<meta name="viewport" content="width=device-width, maximum-scale=1.0, minimum-scale=1.0, initial-scale=1.0" />
	<title>Blackstone</title>
	<meta name="ad.size" content="width=300,height=50" />
	<script>
		var clickTag = "https://www.blackstone.com";

		var sw = 300;
		var sh = 50;
		var sizeType = sw + "x" + sh;

		var concept = "mobile";

	</script>
	<style>
		html,
		body,
		div,
		span,
		applet,
		object,
		iframe,
		h1,
		h2,
		h3,
		h4,
		h5,
		h6,
		p,
		blockquote,
		pre,
		a,
		abbr,
		acronym,
		address,
		big,
		cite,
		code,
		del,
		dfn,
		em,
		img,
		ins,
		kbd,
		q,
		s,
		samp,
		small,
		strike,
		strong,
		sub,
		sup,
		tt,
		var,
		b,
		u,
		i,
		center,
		dl,
		dt,
		dd,
		ol,
		ul,
		li,
		fieldset,
		form,
		label,
		legend,
		table,
		caption,
		tbody,
		tfoot,
		thead,
		tr,
		th,
		td,
		article,
		aside,
		canvas,
		details,
		embed,
		figure,
		figcaption,
		footer,
		header,
		hgroup,
		menu,
		nav,
		output,
		ruby,
		section,
		summary,
		time,
		mark,
		audio,
		video {
			border: 0;
			font-size: 100%;
			font: inherit;
			vertical-align: baseline;
			margin: 0;
			padding: 0
		}

		article,
		aside,
		details,
		figcaption,
		figure,
		footer,
		header,
		hgroup,
		menu,
		nav,
		section {
			display: block
		}

		body {
			line-height: 1
		}

		ol,
		ul {
			list-style: none
		}

		blockquote,
		q {
			quotes: none
		}

		blockquote:before,
		blockquote:after,
		q:before,
		q:after {
			content: none
		}

		table {
			border-collapse: collapse;
			border-spacing: 0
		}

		html,
		html a {
			font-smooth: always;
			-webkit-font-smoothing: antialiased;
		}

		* {
			-webkit-tap-highlight-color: transparent;
			-webkit-user-select: none;
			-moz-user-select: none;
			-ms-user-select: none;
		}

		#banner {
			position: relative;
			width: 300px;
			height: 50px;
			overflow: hidden;
			opacity: 0;
		}

		.fs {
			position: absolute;
			background-size: 100% 100%;
			width: 300px;
			height: 50px;
			overflow: hidden;
			-webkit-backface-visibility: hidden;
			backface-visibility: hidden;
		}

		#outline {
			position: absolute;
			left: 0;
			top: 0;
			width: 298px;
			height: 48px;
			border: 1px #FFF solid;
		}

		#bg {
			position: absolute;
			background-size: 100% 100%;
			width: 300px;
			height: 50px;
			overflow: hidden;
			background-color: #000;
		}

		#bottom-logo {
			background-image: url(bottom-logo.png);
		}

		#legal {
			background-image: url(legal.png);
		}

		#headline2_4 {
			background-image: url(headline2_4.png);
		}

		#headline2_3 {
			background-image: url(headline2_3.png);
		}

		#headline2_2 {
			background-image: url(headline2_2.png);
		}

		#headline2_1 {
			background-image: url(headline2_1.png);
		}

		#headline1_5 {
			background-image: url(headline1_5.png);
		}

		#headline1_4 {
			background-image: url(headline1_4.png);
		}

		#headline1_3 {
			background-image: url(headline1_3.png);
		}

		#headline1_2 {
			background-image: url(headline1_2.png);
		}

		#headline1_1 {
			background-image: url(headline1_1.png);
		}

		#bg {
			background-image: url(bg.jpg);
		}
	</style>
</head>

<body>
	<div id="banner">
		<div id="banner-main">
			<div class="fs" id="bg"></div>

			<div class="fs " id="frames">
				<div class="fs " id="bottom-logo"></div>
				<div class="fs " id="legal"></div>
				<div class="fs " id="headline2_4"></div>
				<div class="fs " id="headline2_3"></div>
				<div class="fs " id="headline2_2"></div>
				<div class="fs " id="headline2_1"></div>
				<div class="fs " id="headline1_5"></div>
				<div class="fs " id="headline1_4"></div>
				<div class="fs " id="headline1_3"></div>
				<div class="fs " id="headline1_2"></div>
				<div class="fs " id="headline1_1"></div>
			</div>
			<div class="fs " id="cta-hold">
			</div>


		</div>
		<div id="outline"></div>
		<a href="javascript:void(window.open(window.clickTag))">
			<div class="fs" id="click-catch"></div>
		</a>
		<a href="javascript:void(window.open(window.clickTag))">
			<div id="click-over"></div>
		</a>
	</div>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.1.1/gsap.min.js"></script>
	<script src="CustomEase.min.js"></script>
	<script type="text/javascript">
		//elems
		var initFadeInDur = 1;
		var bottomLogo = document.getElementById("bottom-logo");
		var legal = document.getElementById("legal");
		var headline2_4 = document.getElementById("headline2_4");
		var headline2_3 = document.getElementById("headline2_3");
		var headline2_2 = document.getElementById("headline2_2");
		var headline2_1 = document.getElementById("headline2_1");
		var headline1_5 = document.getElementById("headline1_5");
		var headline1_4 = document.getElementById("headline1_4");
		var headline1_3 = document.getElementById("headline1_3");
		var headline1_2 = document.getElementById("headline1_2");
		var headline1_1 = document.getElementById("headline1_1");
		var frames = document.getElementById("frames");
		var ctaHold = document.getElementById("cta-hold");

		var sizeData = {
			"slideOffset": -8, "clickOverPos": { "width": 0, "height": 0, "left": 0, "top": 0 }, "dealerNamePos": { "left": 0, "top": 0 }, "layers": [[
				{ "id": "bottom-logo", "left": 418, "top": 30, "width": 154, "height": 40, "originX": 484, "originY": 49 },
				{ "id": "legal", "left": 0, "top": 0, "width": 640, "height": 100, "originX": 156, "originY": 65 },
				{ "id": "headline2_4", "left": 201, "top": 16, "width": 150, "height": 38, "originX": 312, "originY": 39, "class": "headline2" },
				{ "id": "headline2_3", "left": 277, "top": 16, "width": 76, "height": 38, "originX": 312, "originY": 39, "class": "headline2" },
				{ "id": "headline2_2", "left": 201, "top": 16, "width": 76, "height": 38, "originX": 238, "originY": 39, "class": "headline2" },
				{ "id": "headline2_1", "left": 201, "top": 16, "width": 68, "height": 38, "originX": 234, "originY": 36, "class": "headline2" },
				{ "id": "headline1_5", "left": 245, "top": 16, "width": 70, "height": 38, "originX": 278, "originY": 38, "class": "headline1" },
				{ "id": "headline1_4", "left": 201, "top": 16, "width": 44, "height": 38, "originX": 224, "originY": 36, "class": "headline1" },
				{ "id": "headline1_3", "left": 151, "top": 16, "width": 50, "height": 38, "originX": 177, "originY": 36, "class": "headline1" },
				{ "id": "headline1_2", "left": 81, "top": 16, "width": 70, "height": 38, "originX": 116, "originY": 36, "class": "headline1" },
				{ "id": "headline1_1", "left": 21, "top": 16, "width": 60, "height": 38, "originX": 52, "originY": 36, "class": "headline1" }]]
		};

		gsap.registerPlugin(CustomEase)

		CustomEase.create(
			"customHeadlineIn",
			"M0,0 C0.168,0.505 0.239,0.718 0.315,0.805 0.394,0.896 0.612,1 1,1 "
		);

		//state
		var defaultForce3D = false;
		var needsFrameTick = true;

		var author = false;

		var numHeadline1 = 0;
		var numHeadline2 = 0;

		var clickOver = document.getElementById("click-over");

		var headlineInEase = "power1.inOut";
		var headlineInDur = 0.9;
		var slideEase = "power3.out";
		var slideDur = 1.2;
		var slideOffset = sizeData.slideOffset;

		var wordStagger = 0.3;
		var lineStagger = 0.4;

		var inStaggers = [0, wordStagger, wordStagger, lineStagger, wordStagger, wordStagger, wordStagger, wordStagger];
		var inStaggers2 = [0, wordStagger, wordStagger, wordStagger, wordStagger, wordStagger];
		var inDirs = ["left", "left", "left", "left", "left", "left", "left", "left"];
		var inDirs2 = ["left", "left", "left", "left", "left", "left"];

		var legalAfter = true;
		if (sizeType == "728x90" || sizeType == "970x90" || sizeType == "160x600") {

			//legalAfter = true;

		}

		var setMasks = "headline1";

		//init elements
		function initGFX() {

			//
			//reset gfx
			//
			gsap.set("#outline", { z: 2, pointerEvents: "none" });

			setTopLayersPos(sizeData.layers);

			gsap.set(bottomLogo, { autoAlpha: 0, scale: 0.8, transformOrigin: "50% 50%" });
			gsap.set(legal, { autoAlpha: 0 });


			if (concept != "mobile") {
				gsap.set(mainimage, { autoAlpha: 0 });
				gsap.set(ctaLine, { scaleX: 0, transformOrigin: "0 0" });
				gsap.set(ctaHold, { autoAlpha: 1, width: ctaOver.offsetWidth, height: ctaOver.offsetHeight, top: ctaOver.offsetTop, left: ctaOver.offsetLeft });
				gsap.set(ctaOver, { autoAlpha: 0, top: 0, left: 0, y: ctaOver.offsetHeight });
				gsap.set(cta, { autoAlpha: 1, top: 0, left: 0, y: ctaOver.offsetHeight });
				ctaHold.appendChild(cta);
				ctaHold.appendChild(ctaOver);
			}

			gsap.set(clickCatch, { zIndex: 5 });
			gsap.set(clickOver, { zIndex: 6 });

			//size
			if (sizeType == "300x50" || sizeType == "320x50") {

				headlineInDur = 0.8;
			}
			if (sizeType == "300x250") {

				gsap.set("#headline1_6", { zIndex: 3 });

			}
			if (sizeType == "970x250") {

				gsap.set("#headline1_7", { zIndex: 3 });

			}

			gsap.set(".headline1", { x: slideOffset });
			gsap.set(".headline2", { x: slideOffset });

			gsap.set(".headline1", { maskImage: "linear-gradient(90deg, black 0%, rgba(0, 0, 0, 0.01) 0%)" });
			gsap.set(".headline2", { maskImage: "linear-gradient(90deg, black 0%, rgba(0, 0, 0, 0.01) 0%)" });

		}

		//cta
		function activateRollover() {

			var ctaDur = 0.3;

			clickOver.onmouseover = function () {

				gsap.to(cta, 0.25, { autoAlpha: 0, ease: Quad.easeIn });
				gsap.to(ctaOver, 0.25, { autoAlpha: 1, ease: Quad.easeOut });

			}
			clickOver.onmouseout = function () {

				gsap.to(cta, 0.25, { autoAlpha: 1, ease: Quad.easeOut });
				gsap.to(ctaOver, 0.25, { autoAlpha: 0, ease: Quad.easeIn });

			}

		}

		//frame tick 
		function doFrameTick() {

			var mask, start, end;
			var maskW = 80;

			if (setMasks = "headline1") {

				for (i = 0; i < numHeadline1; i++) {

					mask = main["headline1_" + (i + 1) + "Mask"];
					console.log("headline1", mask);
					headline = main["headline1_" + (i + 1)];
					start = (-maskW + (mask.t * (100 + maskW))) + "%";
					end = (mask.t * (100 + maskW)) + "%";
					gsap.set(headline, { maskImage: "linear-gradient(90deg, black " + start + ", rgba(0, 0, 0, 0.0) " + end + ")" });

				}

			}

			if (setMasks = "headline2") {

				for (i = 0; i < numHeadline2; i++) {

					mask = main["headline2_" + (i + 1) + "Mask"];
					console.log("headline2", mask);
					headline = main["headline2_" + (i + 1)];
					start = (-maskW + (mask.t * (100 + maskW))) + "%";
					end = (mask.t * (100 + maskW)) + "%";
					gsap.set(headline, { maskImage: "linear-gradient(90deg, black " + start + ", rgba(0, 0, 0, 0.0) " + end + ")" });

				}

			}

		}

		//animation
		function doAnimation() {

			var tl = gsap.timeline();

			var startTime = 0.5;
			var i, headline;
			var inTime = startTime;

			var mask;
			for (i = 0; i < numHeadline1; i++) {
				inTime += inStaggers[i];
				headline = main["headline1_" + (i + 1)];
				mask = main["headline1_" + (i + 1) + "Mask"];
				tl.to(mask, { t: 1, duration: headlineInDur, ease: headlineInEase }, inTime);
				tl.to(headline, { x: 0, y: 0, duration: slideDur, ease: slideEase }, inTime);

			}

			if (concept != "mobile") {

				tl.to(mainimage, { duration: 1.2, autoAlpha: 1, x: 0, y: 0, ease: "power1.out" }, 0.5);

			} else {

				tl.to(legal, { duration: 1.2, autoAlpha: 1, x: 0, y: 0, ease: "power1.out" }, 0.5);

			}
			tl.to(bottomLogo, { duration: 1, autoAlpha: 1, scale: 1, x: 0, y: 0, ease: "power1.out" }, 0.1);

			tl.add("frame1_out", "+=1");
			if (concept != "mobile") {

				tl.to(".headline1", { duration: 1.5, autoAlpha: 0, ease: "power4.inOut" }, "frame1_out");
				tl.to(mainimage, { duration: 1.5, autoAlpha: 0, ease: "power4.inOut" }, "frame1_out");

			} else {

				tl.to([headline1_4, headline1_5], { duration: 1.5, autoAlpha: 0, ease: "power4.inOut" }, "frame1_out");

			}

			tl.add("frame2_in", "-=0.6");

			inTime = 0;

			for (i = 0; i < numHeadline2; i++) {

				if (concept == "mobile" && i > 0) {

					break;

				}

				inTime += inStaggers2[i];
				headline = main["headline2_" + (i + 1)];
				mask = main["headline2_" + (i + 1) + "Mask"];
				tl.to(mask, { t: 1, duration: headlineInDur, ease: headlineInEase }, "frame2_in+=" + inTime);
				tl.to(headline, { x: 0, y: 0, duration: slideDur, ease: slideEase }, "frame2_in+=" + inTime);

			}

			if (!legalAfter) {

				tl.to(legal, { duration: 1.2, autoAlpha: 1, x: 0, y: 0, ease: "power1.out" }, "frame2_in");

			}

			if (concept != "mobile") {

				tl.add("endframe", "-=0.5");
				tl.to(ctaLine, { duration: 1, scaleX: 1, ease: "power4.out" }, "endframe");
				tl.to([cta, ctaOver], { duration: 1, x: 0, y: 0, ease: "power4.inOut" }, "endframe");

			} else {

				tl.add("end", "+=1");
				tl.to(headline2_1, { duration: 1.5, autoAlpha: 0, ease: "power4.inOut" }, "end");

				tl.to(main["headline2_2Mask"], { t: 1, duration: headlineInDur, ease: headlineInEase }, "end+=1");
				tl.to(headline2_2, { x: 0, y: 0, duration: slideDur, ease: slideEase }, "end+=1");
				tl.to(main["headline2_3Mask"], { t: 1, duration: headlineInDur, ease: headlineInEase }, "end+=" + (1 + wordStagger));
				tl.to(headline2_3, { x: 0, y: 0, duration: slideDur, ease: slideEase }, "end+=" + (1 + wordStagger));


				tl.to(headline2_2, { duration: 1.5, autoAlpha: 0, ease: "power4.out" }, "end+=" + (slideDur * 3));
				tl.to(headline2_3, { duration: 1.5, autoAlpha: 0, ease: "power4.out" }, "end+=" + (slideDur * 3));
				
				// tl.add("end", "+=2");
				tl.to(main["headline2_4Mask"], { t: 1, duration: headlineInDur, ease: headlineInEase }, "end+=" + (slideDur * 3.5));
				tl.to(headline2_4, { x: 0, y: 0, duration: slideDur, ease: slideEase }, "end+=" + (slideDur * 3.5));

			}

			if (legalAfter) {

				tl.to(legal, { duration: 1.2, autoAlpha: 1, x: 0, y: 0, ease: "power1.out" }, "endframe+=0.5");

			}

			activateRollover();

		}



		//util
		function setTopLayersPos(layers) {
			for (var i = 0; i < layers.length; i++) {
				var layerSet = layers[i];
				setLayersPos(layerSet)
			}
		}
		function setLayersPos(layerSet) {
			for (var i = 0; i < layerSet.length; i++) {
				setLayer(layerSet[i]);
			}
		}
		function setLayer(layer) {
			let isGroup = (layer.layers != null);
			if (!isGroup) {
				if (layer.id == "cta") {
					gsap.set(clickOver, { position: "absolute", left: layer.left * 0.5, top: layer.top * 0.5, width: layer.width * 0.5, height: layer.height * 0.5 });
				}
				gsap.set("#" + layer.id, { left: layer.left * 0.5, top: layer.top * 0.5, width: layer.width * 0.5, height: layer.height * 0.5, transformOrigin: (layer.originX * 0.5).toString() + "px " + (layer.originY * 0.5).toString() + "px" });
				if (layer.class != undefined) {
					gsap.set("#" + layer.id, { className: "fs " + layer.class });
				}

				if (layer.id.indexOf("headline1") != -1) {
					main[layer.id + "Mask"] = { "t": 0 };
					numHeadline1++;
				}
				if (layer.id.indexOf("headline2") != -1) {
					main[layer.id + "Mask"] = { "t": 0 };
					numHeadline2++;
				}

			} else {
				gsap.set("#" + layer.id, { transformOrigin: (layer.originX * 0.5).toString() + "px " + (layer.originY * 0.5).toString() + "px" });
				for (var i = 0; i < layer.layers.length; i++) {
					setLayer(layer.layers[i]);
				}
			}
		}

		function rnd(a) {
			var t = a += 0x6D2B79F5;
			t = Math.imul(t ^ t >>> 15, t | 1);
			t ^= t + Math.imul(t ^ t >>> 7, t | 61);
			return ((t ^ t >>> 14) >>> 0) / 4294967296;
		}

		function rndBetween(min, max) {
			return min + (max - min) * Math.random();
		}
		function lerp(a, b, t) {
			return (1 - t) * a + t * b;
		}
		function clamp(value, min, max) {
			return Math.max(Math.min(value, max), min);
		}
		function mapRange(value, low1, high1, low2, high2) {
			return low2 + (high2 - low2) * (value - low1) / (high1 - low1);
		}
		function mapRangeClamped(value, low1, high1, low2, high2) {
			return clamp(mapRange(value, low1, high1, low2, high2), low2, high2);
		}
		function createCanvas(obj, containElem, width, height) {
			obj.canvas = document.createElement("canvas");
			obj.ctx = obj.canvas.getContext("2d");
			obj.width = width;
			obj.height = height;
			obj.canvas.width = width;
			obj.canvas.height = height;
			obj.canvas.className = "fs";
			obj.canvas.style.width = (width / 2) + "px";
			obj.canvas.style.height = (height / 2) + "px";
			containElem.appendChild(obj.canvas);
		}


		//
		var main = this;
		var bannerContain = document.getElementById("banner");
		var clickCatch = document.getElementById("click-catch");
		//time
		var i;
		var timeFromStart = 0;
		var prevTime = 0;
		var currentTime = 0;
		var deltaTime = 0;
		//state
		var bannerEnd = false;

		//init
		window.onload = function () {

			//reset elements
			initGFX();

			//start
			gsap.delayedCall(0.02, begin);

		}
		function begin() {
			//show banner
			gsap.to(bannerContain, initFadeInDur, { opacity: 1, ease: Linear.eaesNone });
			//time
			currentTime = gsap.ticker.time;
			if (needsFrameTick) {
				gsap.ticker.add(frameTick);
			}
			//animation sequence
			gsap.delayedCall(15, function () {
				bannerEnd = true;
			});
			doAnimation();
		}
		function frameTick(event) {
			//time
			prevTime = currentTime;
			currentTime = gsap.ticker.time;
			deltaTime = (currentTime - prevTime);
			timeFromStart += deltaTime;
			doFrameTick();
		}
		function print(obj) {
			console.log(obj);
		}

	</script>
</body>

</html>
